<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--font-sans);padding:22px 26px;}
  .row{display:flex;gap:14px;align-items:stretch}
  .col{display:flex;flex-direction:column}
  .sw{flex:1;border-radius:var(--radius-sm);border:1px solid rgba(0,0,0,.06);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;min-height:84px}
  .sw .hex{font-size:11px;letter-spacing:.04em;font-weight:600}
  .sw .nm{font-size:11px;opacity:.75;margin-top:2px}
  .lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.16em;color:var(--gray-light);margin-bottom:12px}
  .tok{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
.tok:last-child{border-bottom:0}.tok .k{font-size:13px;font-weight:600}.tok .v{font-size:12px;color:var(--gray);font-family:var(--font-display)}
.dot{width:16px;height:16px;border:1px solid rgba(0,0,0,.1);border-radius:2px;display:inline-block;vertical-align:-3px;margin-right:9px}
</style></head><body><div class="lbl">Semantic tokens</div>
<div class="tok"><span class="k"><span class="dot" style="background:var(--paper)"></span>--bg</span><span class="v">#FAF7F1</span></div><div class="tok"><span class="k"><span class="dot" style="background:var(--surface)"></span>--surface</span><span class="v">#FEFCF8</span></div><div class="tok"><span class="k"><span class="dot" style="background:var(--ink)"></span>--text-primary</span><span class="v">#1A1815</span></div><div class="tok"><span class="k"><span class="dot" style="background:var(--gray)"></span>--text-secondary</span><span class="v">#6E665B</span></div><div class="tok"><span class="k"><span class="dot" style="background:var(--border)"></span>--border</span><span class="v">#E4DDD0</span></div><div class="tok"><span class="k"><span class="dot" style="background:var(--accent)"></span>--accent</span><span class="v">#3F6175</span></div></body></html>
