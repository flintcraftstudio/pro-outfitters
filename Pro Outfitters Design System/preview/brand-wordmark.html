<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--font-sans)}
.lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.16em;color:var(--gray-light);margin-bottom:14px}
body{background:var(--paper);padding:24px 28px;color:var(--ink)}
.wm{display:inline-flex;flex-direction:column;align-items:center;gap:6px}
.wm .top{font-family:var(--font-display);font-size:30px;font-weight:500;letter-spacing:.04em;line-height:1}
.wm .rule{display:flex;align-items:center;gap:10px;width:100%}
.wm .rule .ln{flex:1;height:1px;background:var(--gold)}
.wm .rule .est{font-family:var(--font-sans);font-size:10px;font-weight:600;letter-spacing:.24em;color:var(--gold-deep)}</style></head><body>
<div class="lbl">CSS wordmark lockup · inherits currentColor</div>
<div class="wm"><div class="top">PRO&nbsp;OUTFITTERS</div><div class="rule"><span class="ln"></span><span class="est">EST. 1970</span><span class="ln"></span></div></div>
</body></html>
