<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--font-sans);padding:24px 28px;}
  .lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.16em;color:var(--gray-light);margin-bottom:16px}
  /* button system */
  .btn{font-family:var(--font-sans);font-size:14px;font-weight:600;letter-spacing:.04em;cursor:pointer;
    border-radius:var(--radius-sm);transition:all var(--dur-fast) var(--ease-out);text-decoration:none;display:inline-flex;align-items:center;gap:9px}
  .btn--primary{background:var(--ink);color:var(--text-on-dark);border:1px solid var(--ink);padding:14px 26px}
  .btn--primary:hover{background:var(--gold-deep);border-color:var(--gold-deep)}
  .btn--secondary{background:transparent;color:var(--ink);border:1px solid var(--border-strong);padding:14px 26px}
  .btn--secondary:hover{border-color:var(--ink)}
  .btn--text{background:none;border:0;color:var(--accent);padding:6px 0;text-transform:uppercase;font-size:12px;letter-spacing:.14em}
  .btn--text span{border-bottom:1px solid transparent;transition:border-color var(--dur-fast)}
  .btn--text:hover span{border-bottom-color:currentColor}
  .nav{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--border);background:var(--surface);padding:16px 22px;border-radius:var(--radius-sm)}
.wm{font-family:var(--font-display);font-size:18px;letter-spacing:.02em}.wm b{font-weight:600}.wm .e{font-family:var(--font-sans);font-size:9px;letter-spacing:.22em;color:var(--gold-deep);display:block;margin-top:1px}
.links{display:flex;gap:24px;font-size:13px;color:var(--ink-soft)}.links span{cursor:pointer}
.cta{background:var(--ink);color:var(--text-on-dark);font-size:12px;font-weight:600;letter-spacing:.06em;padding:11px 20px;border-radius:2px}
</style></head><body><div class="lbl">Persistent nav + CTA</div>
<div class="nav"><div class="wm">PRO OUTFITTERS<span class="e">EST. 1970</span></div>
<div class="links"><span>Fishing</span><span>Hunting</span><span>Lodges</span><span>Stewardship</span></div>
<div class="cta">PLAN YOUR TRIP</div></div></body></html>
