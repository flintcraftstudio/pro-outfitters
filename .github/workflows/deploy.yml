name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    env:
      # Directory on the VPS containing docker-compose.yml. Override with a
      # VPS_APP_DIR secret; defaults to where the first deploy landed.
      APP_DIR: ${{ secrets.VPS_APP_DIR || '/opt/pro-outfitters' }}

    steps:
      - name: Deploy to VPS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Pipe the registry token over stdin so it never lands in the
          # remote process args. The remote shell reads it as $TOKEN, logs
          # in to ghcr, pulls the freshly-pushed image, and recreates the
          # container. Pruning drops the now-dangling old image.
          echo "${{ secrets.GITHUB_TOKEN }}" | ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/deploy_key \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              "TOKEN=\$(cat) && \
               echo \"\$TOKEN\" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin && \
               cd ${{ env.APP_DIR }} && \
               docker compose pull && \
               docker compose up -d --force-recreate && \
               docker image prune -f"
