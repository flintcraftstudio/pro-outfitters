<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--font-sans);padding:22px 26px;}
  .row{display:flex;gap:14px;align-items:stretch}
  .col{display:flex;flex-direction:column}
  .sw{flex:1;border-radius:var(--radius-sm);border:1px solid rgba(0,0,0,.06);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;min-height:84px}
  .sw .hex{font-size:11px;letter-spacing:.04em;font-weight:600}
  .sw .nm{font-size:11px;opacity:.75;margin-top:2px}
  .lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.16em;color:var(--gray-light);margin-bottom:12px}
  
</style></head><body><div class="lbl">Ink &amp; text grays</div><div class="row">
<div class="sw" style="background:var(--ink);color:#F3EEE5"><div class="hex">#1A1815</div><div class="nm">--ink · text-primary</div></div>
<div class="sw" style="background:var(--ink-soft);color:#F3EEE5"><div class="hex">#423D36</div><div class="nm">--ink-soft</div></div>
<div class="sw" style="background:var(--gray);color:#F3EEE5"><div class="hex">#6E665B</div><div class="nm">--gray · text-secondary</div></div>
<div class="sw" style="background:var(--gray-light);color:#F3EEE5"><div class="hex">#9A9285</div><div class="nm">--gray-light · tertiary</div></div>
</div></body></html>
