<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--font-sans);padding:24px 28px;}
  .lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.16em;color:var(--gray-light);margin-bottom:16px}
  .meta{font-size:11px;color:var(--gray-light)}
  .row{display:flex;gap:26px}.b{width:150px;height:78px;background:var(--surface);border:1px solid var(--border);border-radius:2px}
.cap{font-size:11px;color:var(--gray);margin-top:12px}
</style></head><body><div class="lbl">Elevation · almost none</div><div class="row">
<div><div class="b"></div><div class="cap">flat · hairline only</div></div>
<div><div class="b" style="box-shadow:var(--shadow-soft)"></div><div class="cap">--shadow-soft · sticky nav</div></div>
<div><div class="b" style="box-shadow:var(--shadow-lift)"></div><div class="cap">--shadow-lift · rare float</div></div>
</div></body></html>
