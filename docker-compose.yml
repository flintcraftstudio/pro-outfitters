services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      # Persist the SQLite database across container rebuilds.
      # The Dockerfile sets DB_PATH=/var/lib/app/app.db; this volume
      # mounts the parent directory so the .db plus its WAL/SHM
      # sidecars all survive `docker compose up --build`.
      - app-data:/var/lib/app

volumes:
  app-data:
