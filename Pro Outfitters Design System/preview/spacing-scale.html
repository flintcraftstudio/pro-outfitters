<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--font-sans);padding:24px 28px;}
  .lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.16em;color:var(--gray-light);margin-bottom:16px}
  .meta{font-size:11px;color:var(--gray-light)}
  .r{display:flex;align-items:center;gap:14px;margin-bottom:9px}
.bar{height:14px;background:var(--accent);border-radius:1px}.t{font-size:11px;color:var(--gray);width:120px;flex:0 0 auto}
</style></head><body><div class="lbl">Spacing scale · 4px base</div>
<div class="r"><span class="t">--space-2 · 8px</span><span class="bar" style="width:12.8px"></span></div><div class="r"><span class="t">--space-4 · 16px</span><span class="bar" style="width:25.6px"></span></div><div class="r"><span class="t">--space-5 · 24px</span><span class="bar" style="width:38.400000000000006px"></span></div><div class="r"><span class="t">--space-6 · 32px</span><span class="bar" style="width:51.2px"></span></div><div class="r"><span class="t">--space-7 · 48px</span><span class="bar" style="width:76.80000000000001px"></span></div><div class="r"><span class="t">--space-8 · 64px</span><span class="bar" style="width:102.4px"></span></div><div class="r"><span class="t">--space-9 · 96px</span><span class="bar" style="width:153.60000000000002px"></span></div></body></html>
